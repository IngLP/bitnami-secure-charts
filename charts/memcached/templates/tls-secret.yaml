{{- if (include "memcached.createTlsSecret" .) }}
{{- $secretName := include "memcached.tls.secretName" . }}
{{- $releaseNamespace := include "common.names.namespace" . }}
{{- $certValue := "" }}
{{- $keyValue  := "" }}
{{- $caValue   := "" }}
{{- if and .Values.tls.autoGenerated.enabled (eq (lower (default "helm" .Values.tls.autoGenerated.engine)) "helm") }}
  {{- $ca        := genCA "memcached-ca" 365 }}
  {{- $fullname  := include "common.names.fullname" . }}
  {{- $sans      := include "common.certs.sans" (dict "namespace" $releaseNamespace "clusterDomain" .Values.clusterDomain "serviceName" $fullname "loopback" .Values.tls.autoGenerated.loopback "extraSANs" (.Values.tls.autoGenerated.extraSANs | default (list))) }}
  {{- $altNames  := $sans | splitList " " | compact }}
  {{- $cert      := genSignedCert $fullname nil $altNames 365 $ca }}
  {{- $certValue  = $cert.Cert }}
  {{- $keyValue   = $cert.Key }}
  {{- $caValue    = $ca.Cert }}
{{- else }}
  {{- $certValue = .Values.tls.cert }}
  {{- $keyValue  = .Values.tls.key }}
  {{- $caValue   = .Values.tls.ca }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $releaseNamespace | quote }}
  labels: {{- include "common.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
    app.kubernetes.io/component: memcached
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" (dict "value" .Values.commonAnnotations "context" $) | nindent 4 }}
  {{- end }}
type: kubernetes.io/tls
data:
  {{ .Values.tls.certFilename }}: {{ include "common.secrets.lookup" (dict "secret" $secretName "key" .Values.tls.certFilename "defaultValue" $certValue "context" $) }}
  {{ .Values.tls.certKeyFilename }}: {{ include "common.secrets.lookup" (dict "secret" $secretName "key" .Values.tls.certKeyFilename "defaultValue" $keyValue "context" $) }}
  {{- if or .Values.tls.certCAFilename $caValue }}
  {{ .Values.tls.certCAFilename | default "ca.crt" }}: {{ include "common.secrets.lookup" (dict "secret" $secretName "key" (.Values.tls.certCAFilename | default "ca.crt") "defaultValue" $caValue "context" $) }}
  {{- end }}
{{- end }}
