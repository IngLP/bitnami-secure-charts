{{- if and .Values.tls.enabled .Values.tls.autoGenerated.enabled (eq (lower .Values.tls.autoGenerated.engine) "cert-manager") (not .Values.tls.existingSecret) }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ printf "%s-tls-crt" (include "common.names.fullname" .) | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
    app.kubernetes.io/component: memcached
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" (dict "value" .Values.commonAnnotations "context" $) | nindent 4 }}
  {{- end }}
spec:
  secretName: {{ include "memcached.tls.secretName" . }}
  commonName: {{ default (printf "%s.%s.svc.%s" (include "common.names.fullname" .) (include "common.names.namespace" .) .Values.clusterDomain) .Values.tls.autoGenerated.certManager.commonName }}
  issuerRef:
    name: {{ default (printf "%s-ca-issuer" (include "common.names.fullname" .) | trunc 63 | trimSuffix "-") .Values.tls.autoGenerated.certManager.existingIssuer }}
    kind: {{ ternary "Issuer" .Values.tls.autoGenerated.certManager.existingIssuerKind (empty .Values.tls.autoGenerated.certManager.existingIssuer) }}
  subject:
    organizations:
      - "Memcached"
  dnsNames:
    {{- $dnsNames := include "common.certs.sans" (dict "namespace" (include "common.names.namespace" .) "clusterDomain" .Values.clusterDomain "serviceName" (include "common.names.fullname" .) "loopback" .Values.tls.autoGenerated.loopback "extraSANs" (.Values.tls.autoGenerated.extraSANs | default (list))) | splitList " " | uniq }}
    {{- range $dnsNames }}
    - {{ . | quote }}
    {{- end }}
  {{- if .Values.tls.autoGenerated.loopback }}
  ipAddresses:
    - 127.0.0.1
  {{- end }}
  privateKey:
    algorithm: {{ .Values.tls.autoGenerated.certManager.keyAlgorithm }}
    size: {{ int .Values.tls.autoGenerated.certManager.keySize }}
  duration: {{ .Values.tls.autoGenerated.certManager.duration }}
  renewBefore: {{ .Values.tls.autoGenerated.certManager.renewBefore }}
{{- end }}
